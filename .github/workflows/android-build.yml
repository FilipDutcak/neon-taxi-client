name: Android Build (APK)
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Rješava Node 20 upozorenje
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Prebacujemo na najnoviji stabilni Node
          cache: 'npm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        # Koristimo ci (clean install) za GitHub Actions jer je brži i sigurniji
        run: npm ci || npm install 

      - name: 🚀 Build APK
        run: eas build --platform android --profile preview --non-interactive